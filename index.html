<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Secure Email Tracking System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h2 {
            margin-bottom: 20px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #5cb85c;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background-color: #4cae4c;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login to Secure Email Tracking System</h2>
        <form id="loginForm" onsubmit="return sanitizeInputs()">
            <input type="text" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p>Note: For security, after 5 failed login attempts, your account will be temporarily locked.</p>
    </div>

    <script>
        function sanitizeInputs() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Basic sanitization (more robust sanitization should be done on the server side)
            const sanitizedEmail = email.replace(/[^a-zA-Z0-9@.]/g, '');
            const sanitizedPassword = password.replace(/[^a-zA-Z0-9!@#$%^&*]/g, '');

            // You can further process the sanitized inputs as needed
            console.log('Sanitized Email:', sanitizedEmail);
            console.log('Sanitized Password:', sanitizedPassword);

            // Basic validation - ensure both fields have content
            if (sanitizedEmail && sanitizedPassword) {
                // Navigate to dashboard on successful login
                window.location.href = 'dashboard.html';
            }

            // Prevent form submission since we handle navigation manually
            return false;
        }
    </script>
</body>
</html>
